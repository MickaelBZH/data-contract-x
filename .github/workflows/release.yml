name: Release to PyPI

# Publishes to PyPI when you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens are stored anywhere.
# One-time setup on PyPI: project → Settings → Publishing → add a GitHub
# "pending publisher" for this repo, workflow `release.yml`, environment `pypi`.

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow a manual run (e.g. to dry-run the build)

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and check
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on an actual release, never on workflow_dispatch.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/datacontract-x
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

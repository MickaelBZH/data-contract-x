<svg xmlns="http://www.w3.org/2000/svg" width="520" height="144" viewBox="0 0 520 144" role="img" aria-label="dcx — Data Contract eXtended">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- icon: contract document + X -->
  <g transform="translate(28,24)">
    <rect width="96" height="96" rx="24" fill="url(#brand)"/>
    <!-- X mark -->
    <g stroke="#ffffff" stroke-width="10" stroke-linecap="round">
      <line x1="32" y1="22" x2="64" y2="54"/>
      <line x1="64" y1="22" x2="32" y2="54"/>
    </g>
    <!-- contract lines -->
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.92">
      <line x1="30" y1="68" x2="66" y2="68"/>
      <line x1="30" y1="80" x2="54" y2="80"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="150" y="82" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="74" font-weight="800" letter-spacing="-2" fill="url(#word)">dcx</text>
  <!-- subtitle -->
  <text x="154" y="112" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="600" letter-spacing="1" fill="#475569">Data Contract e<tspan fill="#0EA5E9" font-weight="800">X</tspan>tended</text>
</svg>
